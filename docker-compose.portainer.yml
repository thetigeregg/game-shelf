services:
  edge:
    container_name: gameshelf-edge
    image: ${EDGE_IMAGE:-ghcr.io/thetigeregg/game-shelf-edge:main}
    environment:
      TZ: ${TZ:-Europe/Zurich}
      FEATURE_MGC_IMPORT: ${FEATURE_MGC_IMPORT:-false}
      FEATURE_TAS: ${FEATURE_TAS:-false}
    command: >-
      /bin/sh -c
      "feature_raw_mgc=$$(printf '%s' \"$${FEATURE_MGC_IMPORT:-false}\" | tr '[:upper:]' '[:lower:]');
      case \"$$feature_raw_mgc\" in 1|true|yes|on) feature_mgc_bool=true ;; *) feature_mgc_bool=false ;; esac;
      feature_raw_tas=$$(printf '%s' \"$${FEATURE_TAS:-false}\" | tr '[:upper:]' '[:lower:]');
      case \"$$feature_raw_tas\" in 1|true|yes|on) feature_tas_bool=true ;; *) feature_tas_bool=false ;; esac;
      mkdir -p /srv/assets;
      config_path=/srv/assets/runtime-config.js;
      tmp_path=/tmp/runtime-config.js;
      if [ -f \"$$config_path\" ]; then
      grep -Fv \"window.__GAME_SHELF_RUNTIME_CONFIG__ = Object.assign(\" \"$$config_path\" > \"$$tmp_path\" || true;
      mv \"$$tmp_path\" \"$$config_path\";
      fi;
      printf '%s' \"window.__GAME_SHELF_RUNTIME_CONFIG__ = Object.assign({}, window.__GAME_SHELF_RUNTIME_CONFIG__, { featureFlags: Object.assign({}, window.__GAME_SHELF_RUNTIME_CONFIG__?.featureFlags ?? {}, { showMgcImport: $$feature_mgc_bool, tasEnabled: $$feature_tas_bool }) });\" >> \"$$config_path\";
      echo >> \"$$config_path\";
      exec caddy run --config /etc/caddy/Caddyfile --adapter caddyfile"
    depends_on:
      - api
    ports:
      - '127.0.0.1:8080:8080'
    volumes:
      - ${MANUALS_HOST_DIR:-${NAS_DATA_ROOT:-./nas-data}/manuals}:/manuals:ro
      - ${ROMS_HOST_DIR:-${NAS_DATA_ROOT:-./nas-data}/roms}:/roms:ro
      - ${BIOS_HOST_DIR:-${NAS_DATA_ROOT:-./nas-data}/bios}:/bios:ro
    restart: unless-stopped

  api:
    container_name: gameshelf-api
    image: ${API_IMAGE:-ghcr.io/thetigeregg/game-shelf-api:main}
    environment:
      TZ: ${TZ:-Europe/Zurich}
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-3000}
      REQUEST_BODY_LIMIT_BYTES: ${REQUEST_BODY_LIMIT_BYTES:-10485760}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://127.0.0.1:8080,http://localhost:8080}
      REQUIRE_AUTH: ${REQUIRE_AUTH:-true}
      DEBUG_HTTP_LOGS: ${DEBUG_HTTP_LOGS:-}
      RATE_LIMIT_INBOUND_GLOBAL_BASELINE_MAX_REQUESTS: ${RATE_LIMIT_INBOUND_GLOBAL_BASELINE_MAX_REQUESTS:-2000}
      RATE_LIMIT_INBOUND_GLOBAL_BASELINE_WINDOW_MS: ${RATE_LIMIT_INBOUND_GLOBAL_BASELINE_WINDOW_MS:-900000}
      RATE_LIMIT_INBOUND_PUBLIC_READ_MAX_REQUESTS: ${RATE_LIMIT_INBOUND_PUBLIC_READ_MAX_REQUESTS:-50}
      RATE_LIMIT_INBOUND_PUBLIC_READ_WINDOW_MS: ${RATE_LIMIT_INBOUND_PUBLIC_READ_WINDOW_MS:-60000}
