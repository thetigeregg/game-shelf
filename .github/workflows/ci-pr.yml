name: CI PR Checks

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: game-shelf-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  quality_checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres_drift:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: drift_test
          POSTGRES_USER: drift
          POSTGRES_PASSWORD: drift
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U drift -d drift_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install backend package dependencies
        run: npm --prefix server ci && npm --prefix worker ci

      - name: Validate Postman collections JSON
        run: |
          for file in postman/*.postman_collection.json; do
            [ -e "$file" ] || continue
            jq empty "$file"
          done

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Script tests
        run: npm run test:scripts

      - name: Backend tests
        env:
          MIGRATION_DRIFT_TEST_DATABASE_URL: postgresql://drift:drift@127.0.0.1:55432/drift_test
        run: npm run test:backend:coverage

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/app/lcov.info
          flags: frontend
          name: frontend-coverage
          disable_search: true
          use_oidc: true
          fail_ci_if_error: true

      - name: Upload server coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./server/coverage/lcov.info
          flags: server
          name: server-coverage
          disable_search: true
          use_oidc: true
          fail_ci_if_error: true

      - name: Upload worker coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./worker/coverage/lcov.info
          flags: worker
          name: worker-coverage
          disable_search: true
          use_oidc: true
          fail_ci_if_error: true

      - name: Upload raw coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: |
            coverage/app/lcov.info
            server/coverage/lcov.info
            worker/coverage/lcov.info
          if-no-files-found: error

      - name: Backup ops smoke test
        run: npm run test:backup:ops

      - name: Backup ops cleanup
        if: always()
        run: docker compose -f docker-compose.yml down --remove-orphans -v

      - name: Install Playwright browser
        run: npm run test:ui:e2e:install

      - name: UI tests
        run: npm run test:ui

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  docker_build_validation:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: edge
            dockerfile: edge/Dockerfile
          - image: api
            dockerfile: server/Dockerfile
          - image: hltb-scraper
            dockerfile: hltb-scraper/Dockerfile
          - image: metacritic-scraper
            dockerfile: metacritic-scraper/Dockerfile
          - image: psprices-scraper
            dockerfile: psprices-scraper/Dockerfile
          - image: backup
            dockerfile: backup/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Write production Firebase environment (edge parity check)
        if: matrix.image == 'edge'
        run: bash scripts/write-environment-prod.sh ci

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build ${{ matrix.image }} image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          provenance: false
