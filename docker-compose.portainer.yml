services:
  edge:
    container_name: gameshelf-edge
    image: ${EDGE_IMAGE:-ghcr.io/thetigeregg/game-shelf-edge:main}
    environment:
      TZ: ${TZ:-Europe/Zurich}
      FEATURE_MGC_IMPORT: ${FEATURE_MGC_IMPORT:-false}
    command: >-
      /bin/sh -c
      "feature_raw=$$(printf '%s' \"$${FEATURE_MGC_IMPORT:-false}\" | tr '[:upper:]' '[:lower:]');
      case \"$$feature_raw\" in 1|true|yes|on) feature_bool=true ;; *) feature_bool=false ;; esac;
      mkdir -p /srv/assets;
      config_path=/srv/assets/runtime-config.js;
      tmp_path=/tmp/runtime-config.js;
      if [ -f \"$$config_path\" ]; then
      grep -v '^window.__GAME_SHELF_RUNTIME_CONFIG__ = Object.assign({}, window.__GAME_SHELF_RUNTIME_CONFIG__, { featureFlags: { showMgcImport:' \"$$config_path\" > \"$$tmp_path\" || true;
      mv \"$$tmp_path\" \"$$config_path\";
      fi;
      printf '%s' \"window.__GAME_SHELF_RUNTIME_CONFIG__ = Object.assign({}, window.__GAME_SHELF_RUNTIME_CONFIG__, { featureFlags: { showMgcImport: $$feature_bool } });\" >> \"$$config_path\";
      echo >> \"$$config_path\";
      exec caddy run --config /etc/caddy/Caddyfile --adapter caddyfile"
    depends_on:
      - api
    ports:
      - '127.0.0.1:8080:8080'
    volumes:
      - ${MANUALS_HOST_DIR:-${NAS_DATA_ROOT:-./nas-data}/manuals}:/manuals:ro
    restart: unless-stopped

  api:
    container_name: gameshelf-api
    image: ${API_IMAGE:-ghcr.io/thetigeregg/game-shelf-api:main}
    environment:
      TZ: ${TZ:-Europe/Zurich}
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-3000}
      REQUEST_BODY_LIMIT_BYTES: ${REQUEST_BODY_LIMIT_BYTES:-10485760}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://127.0.0.1:8080,http://localhost:8080}
      REQUIRE_AUTH: ${REQUIRE_AUTH:-true}
      DEBUG_HTTP_LOGS: ${DEBUG_HTTP_LOGS:-}
      API_TOKEN_FILE: ${API_TOKEN_FILE:-/run/secrets/api_token}
      CLIENT_WRITE_TOKENS_FILE: ${CLIENT_WRITE_TOKENS_FILE:-/run/secrets/client_write_tokens}
      DATABASE_URL_FILE: ${DATABASE_URL_FILE:-/run/secrets/database_url}
      IMAGE_CACHE_DIR: ${IMAGE_CACHE_DIR:-/data/images}
      IMAGE_CACHE_TTL_SECONDS: ${IMAGE_CACHE_TTL_SECONDS:-2592000}
      IMAGE_PROXY_TIMEOUT_MS: ${IMAGE_PROXY_TIMEOUT_MS:-12000}
      IMAGE_PROXY_MAX_BYTES: ${IMAGE_PROXY_MAX_BYTES:-8388608}
      IMAGE_PROXY_RATE_LIMIT_WINDOW_MS: ${IMAGE_PROXY_RATE_LIMIT_WINDOW_MS:-60000}
      IMAGE_PROXY_MAX_REQUESTS_PER_WINDOW: ${IMAGE_PROXY_MAX_REQUESTS_PER_WINDOW:-120}
      IMAGE_PURGE_MAX_REQUESTS_PER_WINDOW: ${IMAGE_PURGE_MAX_REQUESTS_PER_WINDOW:-30}
      CACHE_STATS_RATE_LIMIT_WINDOW_MS: ${CACHE_STATS_RATE_LIMIT_WINDOW_MS:-60000}
      CACHE_STATS_MAX_REQUESTS_PER_WINDOW: ${CACHE_STATS_MAX_REQUESTS_PER_WINDOW:-60}
      TWITCH_CLIENT_ID_FILE: ${TWITCH_CLIENT_ID_FILE:-/run/secrets/twitch_client_id}
      TWITCH_CLIENT_SECRET_FILE: ${TWITCH_CLIENT_SECRET_FILE:-/run/secrets/twitch_client_secret}
      THEGAMESDB_API_KEY_FILE: ${THEGAMESDB_API_KEY_FILE:-/run/secrets/thegamesdb_api_key}
      HLTB_SCRAPER_BASE_URL: ${HLTB_SCRAPER_BASE_URL:-http://hltb-scraper:8788}
      HLTB_SCRAPER_TOKEN_FILE: ${HLTB_SCRAPER_TOKEN_FILE:-/run/secrets/hltb_scraper_token}
      HLTB_CACHE_ENABLE_STALE_WHILE_REVALIDATE: ${HLTB_CACHE_ENABLE_STALE_WHILE_REVALIDATE:-true}
      HLTB_CACHE_FRESH_TTL_SECONDS: ${HLTB_CACHE_FRESH_TTL_SECONDS:-604800}
      HLTB_CACHE_STALE_TTL_SECONDS: ${HLTB_CACHE_STALE_TTL_SECONDS:-7776000}
      HLTB_SEARCH_RATE_LIMIT_MAX_PER_MINUTE: ${HLTB_SEARCH_RATE_LIMIT_MAX_PER_MINUTE:-240}
      METACRITIC_SCRAPER_BASE_URL: ${METACRITIC_SCRAPER_BASE_URL:-http://metacritic-scraper:8789}
      METACRITIC_SCRAPER_TOKEN_FILE: ${METACRITIC_SCRAPER_TOKEN_FILE:-/run/secrets/metacritic_scraper_token}
      METACRITIC_CACHE_ENABLE_STALE_WHILE_REVALIDATE: ${METACRITIC_CACHE_ENABLE_STALE_WHILE_REVALIDATE:-true}
      METACRITIC_CACHE_FRESH_TTL_SECONDS: ${METACRITIC_CACHE_FRESH_TTL_SECONDS:-604800}
      METACRITIC_CACHE_STALE_TTL_SECONDS: ${METACRITIC_CACHE_STALE_TTL_SECONDS:-7776000}
      METACRITIC_SEARCH_RATE_LIMIT_MAX_PER_MINUTE: ${METACRITIC_SEARCH_RATE_LIMIT_MAX_PER_MINUTE:-240}
      MOBYGAMES_API_BASE_URL: ${MOBYGAMES_API_BASE_URL:-https://api.mobygames.com/v2}
      MOBYGAMES_API_KEY_FILE: ${MOBYGAMES_API_KEY_FILE:-/run/secrets/mobygames_api_key}
      OPENAI_API_KEY_FILE: ${OPENAI_API_KEY_FILE:-/run/secrets/openai_api_key}
      MOBYGAMES_CACHE_ENABLE_STALE_WHILE_REVALIDATE: ${MOBYGAMES_CACHE_ENABLE_STALE_WHILE_REVALIDATE:-true}
      MOBYGAMES_CACHE_FRESH_TTL_SECONDS: ${MOBYGAMES_CACHE_FRESH_TTL_SECONDS:-604800}
      MOBYGAMES_CACHE_STALE_TTL_SECONDS: ${MOBYGAMES_CACHE_STALE_TTL_SECONDS:-7776000}
      MOBYGAMES_SEARCH_RATE_LIMIT_MAX_PER_MINUTE: ${MOBYGAMES_SEARCH_RATE_LIMIT_MAX_PER_MINUTE:-12}
      MANUALS_DIR: ${MANUALS_DIR:-/data/manuals}
      MANUALS_PUBLIC_BASE_URL: ${MANUALS_PUBLIC_BASE_URL:-/manuals}
      RECOMMENDATIONS_DAILY_STALE_HOURS: ${RECOMMENDATIONS_DAILY_STALE_HOURS:-24}
      RECOMMENDATIONS_TOP_LIMIT: ${RECOMMENDATIONS_TOP_LIMIT:-200}
      RECOMMENDATIONS_SIMILARITY_K: ${RECOMMENDATIONS_SIMILARITY_K:-20}
      RECOMMENDATIONS_EMBEDDING_MODEL: ${RECOMMENDATIONS_EMBEDDING_MODEL:-text-embedding-3-small}
      RECOMMENDATIONS_EMBEDDING_DIMENSIONS: ${RECOMMENDATIONS_EMBEDDING_DIMENSIONS:-1536}
      RECOMMENDATIONS_EMBEDDING_BATCH_SIZE: ${RECOMMENDATIONS_EMBEDDING_BATCH_SIZE:-32}
      RECOMMENDATIONS_SEMANTIC_WEIGHT: ${RECOMMENDATIONS_SEMANTIC_WEIGHT:-2}
      RECOMMENDATIONS_SIMILARITY_STRUCTURED_WEIGHT: ${RECOMMENDATIONS_SIMILARITY_STRUCTURED_WEIGHT:-0.6}
      RECOMMENDATIONS_SIMILARITY_SEMANTIC_WEIGHT: ${RECOMMENDATIONS_SIMILARITY_SEMANTIC_WEIGHT:-0.4}
      RECOMMENDATIONS_FAILURE_BACKOFF_MINUTES: ${RECOMMENDATIONS_FAILURE_BACKOFF_MINUTES:-120}
      RECOMMENDATIONS_RUNTIME_MODE_DEFAULT: ${RECOMMENDATIONS_RUNTIME_MODE_DEFAULT:-NEUTRAL}
      RECOMMENDATIONS_EXPLORATION_WEIGHT: ${RECOMMENDATIONS_EXPLORATION_WEIGHT:-0.3}
      RECOMMENDATIONS_DIVERSITY_PENALTY_WEIGHT: ${RECOMMENDATIONS_DIVERSITY_PENALTY_WEIGHT:-0.4}
      RECOMMENDATIONS_REPEAT_PENALTY_STEP: ${RECOMMENDATIONS_REPEAT_PENALTY_STEP:-0.2}
      RECOMMENDATIONS_TUNING_MIN_RATED: ${RECOMMENDATIONS_TUNING_MIN_RATED:-8}
      RECOMMENDATIONS_LANE_LIMIT: ${RECOMMENDATIONS_LANE_LIMIT:-20}
      RECOMMENDATIONS_KEYWORDS_STRUCTURED_MAX: ${RECOMMENDATIONS_KEYWORDS_STRUCTURED_MAX:-100}
      RECOMMENDATIONS_KEYWORDS_EMBEDDING_MAX: ${RECOMMENDATIONS_KEYWORDS_EMBEDDING_MAX:-40}
      RECOMMENDATIONS_KEYWORDS_GLOBAL_MAX_RATIO: ${RECOMMENDATIONS_KEYWORDS_GLOBAL_MAX_RATIO:-0.7}
      RECOMMENDATIONS_KEYWORDS_STRUCTURED_MAX_RATIO: ${RECOMMENDATIONS_KEYWORDS_STRUCTURED_MAX_RATIO:-0.3}
      RECOMMENDATIONS_KEYWORDS_MIN_LIBRARY_COUNT: ${RECOMMENDATIONS_KEYWORDS_MIN_LIBRARY_COUNT:-3}
      RECOMMENDATIONS_KEYWORDS_WEIGHT: ${RECOMMENDATIONS_KEYWORDS_WEIGHT:-0.6}
      RECOMMENDATIONS_THEMES_WEIGHT: ${RECOMMENDATIONS_THEMES_WEIGHT:-1.3}
      RECOMMENDATIONS_SIMILARITY_THEME_WEIGHT: ${RECOMMENDATIONS_SIMILARITY_THEME_WEIGHT:-0.35}
      RECOMMENDATIONS_SIMILARITY_GENRE_WEIGHT: ${RECOMMENDATIONS_SIMILARITY_GENRE_WEIGHT:-0.25}
      RECOMMENDATIONS_SIMILARITY_SERIES_WEIGHT: ${RECOMMENDATIONS_SIMILARITY_SERIES_WEIGHT:-0.2}
      RECOMMENDATIONS_SIMILARITY_DEVELOPER_WEIGHT: ${RECOMMENDATIONS_SIMILARITY_DEVELOPER_WEIGHT:-0.1}
      RECOMMENDATIONS_SIMILARITY_PUBLISHER_WEIGHT: ${RECOMMENDATIONS_SIMILARITY_PUBLISHER_WEIGHT:-0.1}
      RECOMMENDATIONS_SIMILARITY_KEYWORD_WEIGHT: ${RECOMMENDATIONS_SIMILARITY_KEYWORD_WEIGHT:-0.05}
      RECOMMENDATIONS_SCHEDULER_ENABLED: ${RECOMMENDATIONS_SCHEDULER_ENABLED:-true}
      RECOMMENDATIONS_DISCOVERY_ENABLED: ${RECOMMENDATIONS_DISCOVERY_ENABLED:-true}
      RECOMMENDATIONS_DISCOVERY_POOL_SIZE: ${RECOMMENDATIONS_DISCOVERY_POOL_SIZE:-2000}
      RECOMMENDATIONS_DISCOVERY_REFRESH_HOURS: ${RECOMMENDATIONS_DISCOVERY_REFRESH_HOURS:-24}
      RECOMMENDATIONS_DISCOVERY_POPULAR_REFRESH_HOURS: ${RECOMMENDATIONS_DISCOVERY_POPULAR_REFRESH_HOURS:-24}
      RECOMMENDATIONS_DISCOVERY_RECENT_REFRESH_HOURS: ${RECOMMENDATIONS_DISCOVERY_RECENT_REFRESH_HOURS:-6}
      RECOMMENDATIONS_DISCOVERY_IGDB_REQUEST_TIMEOUT_MS: ${RECOMMENDATIONS_DISCOVERY_IGDB_REQUEST_TIMEOUT_MS:-15000}
      RECOMMENDATIONS_DISCOVERY_IGDB_MAX_REQUESTS_PER_SECOND: ${RECOMMENDATIONS_DISCOVERY_IGDB_MAX_REQUESTS_PER_SECOND:-4}
      RECOMMENDATIONS_DISCOVERY_ENRICH_ENABLED: ${RECOMMENDATIONS_DISCOVERY_ENRICH_ENABLED:-true}
      RECOMMENDATIONS_DISCOVERY_ENRICH_STARTUP_DELAY_MS: ${RECOMMENDATIONS_DISCOVERY_ENRICH_STARTUP_DELAY_MS:-5000}
      RECOMMENDATIONS_DISCOVERY_ENRICH_INTERVAL_MINUTES: ${RECOMMENDATIONS_DISCOVERY_ENRICH_INTERVAL_MINUTES:-30}
      RECOMMENDATIONS_DISCOVERY_ENRICH_MAX_GAMES_PER_RUN: ${RECOMMENDATIONS_DISCOVERY_ENRICH_MAX_GAMES_PER_RUN:-500}
      RECOMMENDATIONS_DISCOVERY_ENRICH_REQUEST_TIMEOUT_MS: ${RECOMMENDATIONS_DISCOVERY_ENRICH_REQUEST_TIMEOUT_MS:-15000}
      IGDB_METADATA_ENRICH_ENABLED: ${IGDB_METADATA_ENRICH_ENABLED:-true}
      IGDB_METADATA_ENRICH_BATCH_SIZE: ${IGDB_METADATA_ENRICH_BATCH_SIZE:-200}
      IGDB_METADATA_ENRICH_MAX_GAMES_PER_RUN: ${IGDB_METADATA_ENRICH_MAX_GAMES_PER_RUN:-5000}
      IGDB_METADATA_ENRICH_STARTUP_DELAY_MS: ${IGDB_METADATA_ENRICH_STARTUP_DELAY_MS:-5000}
      IGDB_METADATA_ENRICH_REQUEST_TIMEOUT_MS: ${IGDB_METADATA_ENRICH_REQUEST_TIMEOUT_MS:-15000}
    depends_on:
      - postgres
      - hltb-scraper
      - metacritic-scraper
    volumes:
      - ${IMAGE_CACHE_HOST_DIR:-${NAS_DATA_ROOT:-./nas-data}/image-cache}:/data/images
      - ${MANUALS_HOST_DIR:-${NAS_DATA_ROOT:-./nas-data}/manuals}:/data/manuals:ro
      - ${SECRETS_HOST_DIR}:/run/secrets:ro
    restart: unless-stopped

  postgres:
    container_name: gameshelf-postgres
    image: ${POSTGRES_IMAGE:-pgvector/pgvector:pg16}
    environment:
      TZ: ${TZ:-Europe/Zurich}
      PGTZ: ${TZ:-Europe/Zurich}
      POSTGRES_DB: ${POSTGRES_DB:-gameshelf}
      POSTGRES_USER_FILE: ${POSTGRES_USER_FILE:-/run/secrets/postgres_user}
      POSTGRES_PASSWORD_FILE: ${POSTGRES_PASSWORD_FILE:-/run/secrets/postgres_password}
    volumes:
      - ${POSTGRES_HOST_DIR:-${NAS_DATA_ROOT:-./nas-data}/postgres}:/var/lib/postgresql/data
      - ${SECRETS_HOST_DIR}:/run/secrets:ro
    healthcheck:
      test:
        - CMD-SHELL
        - user_file="$${POSTGRES_USER_FILE:-}"; if [ -z "$$user_file" ] || [ ! -r "$$user_file" ]; then echo "POSTGRES_USER_FILE missing/unreadable" >&2; exit 1; fi; user="$$(tr -d '\r\n' < "$$user_file")"; pg_isready -h 127.0.0.1 -U "$$user" -d "$${POSTGRES_DB}" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  hltb-scraper:
    container_name: gameshelf-hltb-scraper
    image: ${HLTB_SCRAPER_IMAGE:-ghcr.io/thetigeregg/game-shelf-hltb-scraper:main}
    environment:
      TZ: ${TZ:-Europe/Zurich}
      PORT: ${HLTB_SCRAPER_PORT:-8788}
      HLTB_SCRAPER_TIMEOUT_MS: ${HLTB_SCRAPER_TIMEOUT_MS:-25000}
      HLTB_SCRAPER_BROWSER_IDLE_MS: ${HLTB_SCRAPER_BROWSER_IDLE_MS:-30000}
      HLTB_SCRAPER_TOKEN_FILE: ${HLTB_SCRAPER_TOKEN_FILE:-/run/secrets/hltb_scraper_token}
      DEBUG_HLTB_SCRAPER_LOGS: ${DEBUG_HLTB_SCRAPER_LOGS:-false}
    volumes:
      - ${SECRETS_HOST_DIR}:/run/secrets:ro
    restart: unless-stopped

  metacritic-scraper:
    container_name: gameshelf-metacritic-scraper
    image: ${METACRITIC_SCRAPER_IMAGE:-ghcr.io/thetigeregg/game-shelf-metacritic-scraper:main}
    environment:
      TZ: ${TZ:-Europe/Zurich}
      PORT: ${METACRITIC_SCRAPER_PORT:-8789}
      METACRITIC_SCRAPER_TIMEOUT_MS: ${METACRITIC_SCRAPER_TIMEOUT_MS:-25000}
      METACRITIC_SCRAPER_BROWSER_IDLE_MS: ${METACRITIC_SCRAPER_BROWSER_IDLE_MS:-30000}
      METACRITIC_SCRAPER_TOKEN_FILE: ${METACRITIC_SCRAPER_TOKEN_FILE:-/run/secrets/metacritic_scraper_token}
      DEBUG_METACRITIC_SCRAPER_LOGS: ${DEBUG_METACRITIC_SCRAPER_LOGS:-false}
    volumes:
      - ${SECRETS_HOST_DIR}:/run/secrets:ro
    restart: unless-stopped

  backup:
    container_name: gameshelf-backup
    image: ${BACKUP_IMAGE:-ghcr.io/thetigeregg/game-shelf-backup:main}
    environment:
      TZ: ${TZ:-Europe/Zurich}
      PGTZ: ${TZ:-Europe/Zurich}
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB:-gameshelf}
      PGUSER_FILE: ${PGUSER_FILE:-/run/secrets/postgres_user}
      PGPASSWORD_FILE: ${PGPASSWORD_FILE:-/run/secrets/postgres_password}
      BACKUP_KEEP_COUNT: ${BACKUP_KEEP_COUNT:-14}
      BACKUP_SCHEDULE_TIME: ${BACKUP_SCHEDULE_TIME:-00:00}
      BACKUP_PGDUMP_RETRIES: ${BACKUP_PGDUMP_RETRIES:-3}
      BACKUP_PGDUMP_RETRY_DELAY_SECONDS: ${BACKUP_PGDUMP_RETRY_DELAY_SECONDS:-5}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${BACKUP_HOST_DIR:-${NAS_DATA_ROOT:-./nas-data}/backups}:/backups
      - ${SECRETS_HOST_DIR}:/run/secrets:ro
    restart: unless-stopped
