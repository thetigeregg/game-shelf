  postgres:
    container_name: gameshelf-postgres
    image: ${POSTGRES_IMAGE:-pgvector/pgvector@sha256:7d400e340efb42f4d8c9c12c6427adb253f726881a9985d2a471bf0eed824dff}
    environment:
      TZ: ${TZ:-Europe/Zurich}
      PGTZ: ${TZ:-Europe/Zurich}
      POSTGRES_DB: ${POSTGRES_DB:-gameshelf}
      POSTGRES_USER_FILE: ${POSTGRES_USER_FILE:-/run/secrets/postgres_user}
      POSTGRES_PASSWORD_FILE: ${POSTGRES_PASSWORD_FILE:-/run/secrets/postgres_password}
    volumes:
      - ${POSTGRES_HOST_DIR:-${NAS_DATA_ROOT:-./nas-data}/postgres}:/var/lib/postgresql/data
      - ${SECRETS_HOST_DIR}:/run/secrets:ro
    healthcheck:
      test:
        - CMD-SHELL
        - user_file="$${POSTGRES_USER_FILE:-}"; if [ -z "$$user_file" ] || [ ! -r "$$user_file" ]; then echo "POSTGRES_USER_FILE missing/unreadable" >&2; exit 1; fi; user="$$(tr -d '\r\n' < "$$user_file")"; pg_isready -h 127.0.0.1 -U "$$user" -d "$${POSTGRES_DB}" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  hltb-scraper:
    container_name: gameshelf-hltb-scraper
    image: ${HLTB_SCRAPER_IMAGE:-ghcr.io/thetigeregg/game-shelf-hltb-scraper:main}
    environment:
      TZ: ${TZ:-Europe/Zurich}
      PORT: ${HLTB_SCRAPER_PORT:-8788}
      HLTB_SCRAPER_TIMEOUT_MS: ${HLTB_SCRAPER_TIMEOUT_MS:-25000}
      HLTB_SCRAPER_BROWSER_IDLE_MS: ${HLTB_SCRAPER_BROWSER_IDLE_MS:-30000}
      HLTB_SCRAPER_TOKEN_FILE: ${HLTB_SCRAPER_TOKEN_FILE:-/run/secrets/hltb_scraper_token}
      DEBUG_HLTB_SCRAPER_LOGS: ${DEBUG_HLTB_SCRAPER_LOGS:-false}
    volumes:
      - ${SECRETS_HOST_DIR}:/run/secrets:ro
    restart: unless-stopped

  metacritic-scraper:
    container_name: gameshelf-metacritic-scraper
    image: ${METACRITIC_SCRAPER_IMAGE:-ghcr.io/thetigeregg/game-shelf-metacritic-scraper:main}
    environment:
      TZ: ${TZ:-Europe/Zurich}
      PORT: ${METACRITIC_SCRAPER_PORT:-8789}
      METACRITIC_SCRAPER_TIMEOUT_MS: ${METACRITIC_SCRAPER_TIMEOUT_MS:-25000}
      METACRITIC_SCRAPER_BROWSER_IDLE_MS: ${METACRITIC_SCRAPER_BROWSER_IDLE_MS:-30000}
      METACRITIC_SCRAPER_TOKEN_FILE: ${METACRITIC_SCRAPER_TOKEN_FILE:-/run/secrets/metacritic_scraper_token}
      DEBUG_METACRITIC_SCRAPER_LOGS: ${DEBUG_METACRITIC_SCRAPER_LOGS:-false}
    volumes:
      - ${SECRETS_HOST_DIR}:/run/secrets:ro
    restart: unless-stopped

  psprices-scraper:
    container_name: gameshelf-psprices-scraper
    image: ${PSPRICES_SCRAPER_IMAGE:-ghcr.io/thetigeregg/game-shelf-psprices-scraper:main}
    environment:
      TZ: ${TZ:-Europe/Zurich}
      PORT: ${PSPRICES_SCRAPER_PORT:-8790}
      PSPRICES_BASE_URL: ${PSPRICES_BASE_URL:-https://psprices.com}
      PSPRICES_REGION_PATH: ${PSPRICES_REGION_PATH:-region-ch}
      PSPRICES_SHOW: ${PSPRICES_SHOW:-games}
      PSPRICES_SCRAPER_TIMEOUT_MS: ${PSPRICES_SCRAPER_TIMEOUT_MS:-25000}
      PSPRICES_SCRAPER_BROWSER_IDLE_MS: ${PSPRICES_SCRAPER_BROWSER_IDLE_MS:-30000}
      PSPRICES_SCRAPER_TOKEN_FILE: ${PSPRICES_SCRAPER_TOKEN_FILE:-/run/secrets/psprices_scraper_token}
      DEBUG_PSPRICES_SCRAPER_LOGS: ${DEBUG_PSPRICES_SCRAPER_LOGS:-false}
    volumes:
      - ${SECRETS_HOST_DIR}:/run/secrets:ro
    restart: unless-stopped

  backup:
    container_name: gameshelf-backup
    image: ${BACKUP_IMAGE:-ghcr.io/thetigeregg/game-shelf-backup:main}
    environment:
      TZ: ${TZ:-Europe/Zurich}
      PGTZ: ${TZ:-Europe/Zurich}
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB:-gameshelf}
      PGUSER_FILE: ${PGUSER_FILE:-/run/secrets/postgres_user}
      PGPASSWORD_FILE: ${PGPASSWORD_FILE:-/run/secrets/postgres_password}
      BACKUP_KEEP_COUNT: ${BACKUP_KEEP_COUNT:-14}
      BACKUP_SCHEDULE_TIME: ${BACKUP_SCHEDULE_TIME:-00:00}
      BACKUP_PGDUMP_RETRIES: ${BACKUP_PGDUMP_RETRIES:-3}
      BACKUP_PGDUMP_RETRY_DELAY_SECONDS: ${BACKUP_PGDUMP_RETRY_DELAY_SECONDS:-5}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${BACKUP_HOST_DIR:-${NAS_DATA_ROOT:-./nas-data}/backups}:/backups
      - ${SECRETS_HOST_DIR}:/run/secrets:ro
    restart: unless-stopped
