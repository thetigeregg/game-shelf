services:
  api:
    environment:
      CORS_ORIGIN: ${CORS_ORIGIN:-http://127.0.0.1:8100,http://localhost:8100,http://127.0.0.1:8080,http://localhost:8080}
      REQUIRE_AUTH: ${REQUIRE_AUTH:-false}
      MANUALS_PUBLIC_BASE_URL: ${MANUALS_PUBLIC_BASE_URL:-http://127.0.0.1:8080/manuals}
      ROMS_PUBLIC_BASE_URL: ${ROMS_PUBLIC_BASE_URL:-http://127.0.0.1:8080/roms}
      BIOS_PUBLIC_BASE_URL: ${BIOS_PUBLIC_BASE_URL:-http://127.0.0.1:8080/bios}
    ports:
      - '127.0.0.1:${API_HOST_PORT:-3000}:3000'

  postgres:
    ports:
      - '127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432'

  hltb-scraper:
    ports:
      - '127.0.0.1:${HLTB_HOST_PORT:-8788}:8788'

  metacritic-scraper:
    ports:
      - '127.0.0.1:${METACRITIC_HOST_PORT:-8789}:8789'

  psprices-scraper:
    ports:
      - '127.0.0.1:${PSPRICES_HOST_PORT:-8790}:8790'
