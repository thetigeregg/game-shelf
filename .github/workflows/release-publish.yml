name: Release & Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: game-shelf-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Bump Version and Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      major: ${{ steps.version.outputs.major }}
      minor: ${{ steps.version.outputs.minor }}
      tag: ${{ steps.version.outputs.tag }}
      release_sha: ${{ steps.push.outputs.release_sha }}

    steps:
      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.AUTOCOMMIT_APP_ID }}
          private-key: ${{ secrets.AUTOCOMMIT_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app_token.outputs.token }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump version files
        id: version
        run: npm exec -- devx release version

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit, tag, and push release
        id: push
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          git add package.json package-lock.json CHANGELOG.md
          if git diff --cached --quiet; then
            echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore(release): ${RELEASE_TAG} [skip ci]"
          if git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            git push origin HEAD:main
            exit 0
          fi
          git tag "${RELEASE_TAG}"
          git push origin HEAD:main
          git push origin "${RELEASE_TAG}"
          echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  detect_image_changes:
    name: Detect image changes
    needs:
      - release
    runs-on: ubuntu-latest
    outputs:
      publish_edge: ${{ steps.check.outputs.publish_edge }}
      publish_api: ${{ steps.check.outputs.publish_api }}
      publish_hltb: ${{ steps.check.outputs.publish_hltb }}
      publish_metacritic: ${{ steps.check.outputs.publish_metacritic }}
      publish_psprices: ${{ steps.check.outputs.publish_psprices }}
      publish_backup: ${{ steps.check.outputs.publish_backup }}
      skipped_images: ${{ steps.check.outputs.skipped_images }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.release_sha }}
          fetch-depth: 0

      - name: Evaluate image publish scope
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            node scripts/docker-publish-should-deploy.mjs \
              --force-all \
              --github-output "$GITHUB_OUTPUT"
            exit 0
          fi

          CURRENT_TAG="${{ needs.release.outputs.tag }}"
          PREV=$(git tag --list 'v*' --sort=-v:refname | awk -v cur="$CURRENT_TAG" '$0==cur {getline; print; exit}')

          node scripts/docker-publish-should-deploy.mjs \
            --base "$PREV" \
            --head "${{ needs.release.outputs.release_sha }}" \
            --github-output "$GITHUB_OUTPUT"

  detect_ios_live_update:
    name: Detect iOS live-update scope
    needs:
      - release
      - detect_image_changes
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.live_update_check.outputs.should_deploy }}
      skipped_reason: ${{ steps.live_update_check.outputs.skipped_reason }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.release_sha }}
          fetch-depth: 0

      - name: Evaluate native-shell changes
        id: native_check
        if: needs.detect_image_changes.outputs.publish_edge == 'true'
        run: |
          CURRENT_TAG="${{ needs.release.outputs.tag }}"
          PREV=$(git tag --list 'v*' --sort=-v:refname | awk -v cur="$CURRENT_TAG" '$0==cur {getline; print; exit}')

          node scripts/ios-testflight-should-deploy.mjs \
            --base "$PREV" \
            --head "${{ needs.release.outputs.release_sha }}" \
            --github-output "$GITHUB_OUTPUT"

      - name: Evaluate iOS live-update scope
        id: live_update_check
        env:
          PUBLISH_EDGE: ${{ needs.detect_image_changes.outputs.publish_edge }}
        run: |
          if [ "$PUBLISH_EDGE" != "true" ]; then
            {
              echo "should_deploy=false"
              echo "skipped_reason=Edge image not publishing on this release."
              echo "matched_paths="
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CURRENT_TAG="${{ needs.release.outputs.tag }}"
          PREV=$(git tag --list 'v*' --sort=-v:refname | awk -v cur="$CURRENT_TAG" '$0==cur {getline; print; exit}')

          NATIVE_ARGS=""
          if [ "${{ steps.native_check.outputs.should_deploy }}" = "true" ]; then
            NATIVE_ARGS="--native-shell-changed"
          fi

          node scripts/ios-live-update-should-deploy.mjs \
            --base "$PREV" \
            --head "${{ needs.release.outputs.release_sha }}" \
            $NATIVE_ARGS \
            --github-output "$GITHUB_OUTPUT"

  ios_live_update_skip_summary:
    name: iOS live-update skip summary
    needs:
      - detect_ios_live_update
    if: >-
      needs.detect_ios_live_update.outputs.should_deploy != 'true' &&
      needs.detect_ios_live_update.outputs.skipped_reason != ''
    runs-on: ubuntu-latest
    steps:
      - name: Write skip summary
        run: |
          {
            echo "## iOS live update skipped"
            echo
            echo "${{ needs.detect_ios_live_update.outputs.skipped_reason }}"
            echo
            echo "See \`docs/ios-live-update.md\` for OTA gating and troubleshooting."
          } >> "$GITHUB_STEP_SUMMARY"

  publish_skip_summary:
    name: Publish skip summary
    needs:
      - detect_image_changes
    if: needs.detect_image_changes.outputs.skipped_images != ''
    runs-on: ubuntu-latest

    steps:
      - name: Write skip summary
        run: |
          {
            echo "## Docker publish skipped images"
            echo
            echo "Skipped: \`${{ needs.detect_image_changes.outputs.skipped_images }}\`"
            echo
            echo "Unchanged images keep their existing \`:main\` digest on GHCR."
            echo "Run **workflow_dispatch** on Release & Publish to force all images."
          } >> "$GITHUB_STEP_SUMMARY"

  publish_images:
    name: Publish Docker Images
    needs:
      - release
      - detect_image_changes
      - detect_ios_live_update
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: edge
            image_name: game-shelf-edge
            dockerfile: edge/Dockerfile
          - id: api
            image_name: game-shelf-api
            dockerfile: server/Dockerfile
          - id: hltb
            image_name: game-shelf-hltb-scraper
            dockerfile: hltb-scraper/Dockerfile
          - id: metacritic
            image_name: game-shelf-metacritic-scraper
            dockerfile: metacritic-scraper/Dockerfile
          - id: psprices
            image_name: game-shelf-psprices-scraper
            dockerfile: psprices-scraper/Dockerfile
          - id: backup
            image_name: game-shelf-backup
            dockerfile: backup/Dockerfile

    steps:
      - name: Checkout
        if: >-
          (matrix.id == 'edge' && needs.detect_image_changes.outputs.publish_edge == 'true') ||
          (matrix.id == 'api' && needs.detect_image_changes.outputs.publish_api == 'true') ||
          (matrix.id == 'hltb' && needs.detect_image_changes.outputs.publish_hltb == 'true') ||
          (matrix.id == 'metacritic' && needs.detect_image_changes.outputs.publish_metacritic == 'true') ||
          (matrix.id == 'psprices' && needs.detect_image_changes.outputs.publish_psprices == 'true') ||
          (matrix.id == 'backup' && needs.detect_image_changes.outputs.publish_backup == 'true')
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.release_sha }}

      - name: Write production environment
        if: matrix.id == 'edge' && needs.detect_image_changes.outputs.publish_edge == 'true'
        run: bash scripts/write-environment-prod.sh prod

      - name: Set up Docker Buildx
        if: >-
          (matrix.id == 'edge' && needs.detect_image_changes.outputs.publish_edge == 'true') ||
          (matrix.id == 'api' && needs.detect_image_changes.outputs.publish_api == 'true') ||
          (matrix.id == 'hltb' && needs.detect_image_changes.outputs.publish_hltb == 'true') ||
          (matrix.id == 'metacritic' && needs.detect_image_changes.outputs.publish_metacritic == 'true') ||
          (matrix.id == 'psprices' && needs.detect_image_changes.outputs.publish_psprices == 'true') ||
          (matrix.id == 'backup' && needs.detect_image_changes.outputs.publish_backup == 'true')
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: >-
          (matrix.id == 'edge' && needs.detect_image_changes.outputs.publish_edge == 'true') ||
          (matrix.id == 'api' && needs.detect_image_changes.outputs.publish_api == 'true') ||
          (matrix.id == 'hltb' && needs.detect_image_changes.outputs.publish_hltb == 'true') ||
          (matrix.id == 'metacritic' && needs.detect_image_changes.outputs.publish_metacritic == 'true') ||
          (matrix.id == 'psprices' && needs.detect_image_changes.outputs.publish_psprices == 'true') ||
          (matrix.id == 'backup' && needs.detect_image_changes.outputs.publish_backup == 'true')
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        if: >-
          (matrix.id == 'edge' && needs.detect_image_changes.outputs.publish_edge == 'true') ||
          (matrix.id == 'api' && needs.detect_image_changes.outputs.publish_api == 'true') ||
          (matrix.id == 'hltb' && needs.detect_image_changes.outputs.publish_hltb == 'true') ||
          (matrix.id == 'metacritic' && needs.detect_image_changes.outputs.publish_metacritic == 'true') ||
          (matrix.id == 'psprices' && needs.detect_image_changes.outputs.publish_psprices == 'true') ||
          (matrix.id == 'backup' && needs.detect_image_changes.outputs.publish_backup == 'true')
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=main
            type=raw,value=${{ needs.release.outputs.tag }}
            type=raw,value=${{ needs.release.outputs.version }}
            type=raw,value=${{ needs.release.outputs.major }}.${{ needs.release.outputs.minor }}
            type=raw,value=${{ needs.release.outputs.major }}
            type=sha,format=short

      - name: Build and push
        if: >-
          (matrix.id == 'edge' && needs.detect_image_changes.outputs.publish_edge == 'true') ||
          (matrix.id == 'api' && needs.detect_image_changes.outputs.publish_api == 'true') ||
          (matrix.id == 'hltb' && needs.detect_image_changes.outputs.publish_hltb == 'true') ||
          (matrix.id == 'metacritic' && needs.detect_image_changes.outputs.publish_metacritic == 'true') ||
          (matrix.id == 'psprices' && needs.detect_image_changes.outputs.publish_psprices == 'true') ||
          (matrix.id == 'backup' && needs.detect_image_changes.outputs.publish_backup == 'true')
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}
          build-args: |
            BUILD_IOS_LIVE_UPDATE=${{ matrix.id == 'edge' && needs.detect_ios_live_update.outputs.should_deploy == 'true' && 'true' || 'false' }}
            IOS_BACKEND_ORIGIN_PROD=${{ vars.IOS_BACKEND_ORIGIN_PROD }}
            IOS_OTA_NATIVE_BUILD_NUMBER=${{ vars.IOS_OTA_NATIVE_BUILD_NUMBER }}
          secrets: |
            IOS_LIVE_UPDATE_PRIVATE_KEY=${{ matrix.id == 'edge' && needs.detect_ios_live_update.outputs.should_deploy == 'true' && secrets.IOS_LIVE_UPDATE_PRIVATE_KEY || '' }}
