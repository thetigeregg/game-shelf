<div class="detail-media-slide">
  <div class="detail-media-slide-backdrop" [style.background-image]="displayBackdropStyle"></div>
  <div class="swiper-zoom-container">
    <img
      [attr.src]="displaySrc"
      [alt]="alt"
      (load)="onImageLoad($event)"
      (error)="onImageError($event)"
    />
  </div>
  @if (shouldShowPreloader) {
    <div class="swiper-lazy-preloader"></div>
  }
</div>
